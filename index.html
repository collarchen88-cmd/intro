<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home · Collar Chen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .nav-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .nav-brand {
            color: white;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* 页面容器 */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 首页 Hero */
        .hero {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--gradient);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; color: white; font-weight: 600;
        }

        .hero h1 { font-size: 28px; color: #2d3748; margin-bottom: 6px; }

        .hero .tagline {
            font-size: 15px; color: #667eea; margin-bottom: 20px; font-weight: 500;
        }

        .hero .divider {
            width: 50px; height: 3px; background: var(--gradient);
            margin: 0 auto 20px; border-radius: 2px;
        }

        .hero .bio {
            font-size: 16px; color: #4a5568; line-height: 1.9;
            max-width: 400px; margin: 0 auto 28px;
        }

        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .preview-card {
            background: white;
            border-radius: 16px;
            padding: 28px 24px;
            text-decoration: none;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transition: all 0.25s;
            display: block;
        }

        .preview-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(102,126,234,0.15);
        }

        .preview-card .icon { font-size: 32px; margin-bottom: 12px; }

        .preview-card h3 {
            font-size: 18px; color: #2d3748; margin-bottom: 8px;
        }

        .preview-card p {
            font-size: 14px; color: #718096; line-height: 1.7;
        }

        .preview-card .arrow {
            display: inline-block; margin-top: 14px;
            font-size: 14px; color: #667eea; font-weight: 500;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .hero { padding: 40px 24px; }
            .nav-inner { flex-direction: column; height: auto; padding: 12px 0; gap: 8px; }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">Collar Chen</a>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主体 -->
    <div class="container">
        <!-- Hero -->
        <div class="hero">
            <div class="avatar">C</div>
            <h1>Collar Chen</h1>
            <p class="tagline">十年外贸经验 · 从业务到运营</p>
            <div class="divider"></div>
            <p class="bio">
                你好！我是一名拥有十年外贸经验的从业者，从一线业务到独立网站运营，现在正探索 AI 如何为外贸运营赋能。
            </p>
        </div>

        <!-- 快捷入口 -->
        <div class="card-grid">
            <a href="about.html" class="preview-card">
                <div class="icon">👤</div>
                <h3>关于我</h3>
                <p>十年外贸经历，从业务员到运营，一路走来的故事。</p>
                <span class="arrow">了解更多 →</span>
            </a>
            <a href="blog.html" class="preview-card">
                <div class="icon">🤖</div>
                <h3>AI 实践</h3>
                <p>AI 时代如何行动？我的思考和三点建议。</p>
                <span class="arrow">了解更多 →</span>
            </a>
            <a href="contact.html" class="preview-card">
                <div class="icon">📬</div>
                <h3>联系方式</h3>
                <p>欢迎交流外贸、运营和 AI 相关话题。</p>
                <span class="arrow">了解更多 →</span>
            </a>
        </div>
    </div>
</body>
</html>
